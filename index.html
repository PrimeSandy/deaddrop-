<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>// DEAD DROP //</title>
  <meta name="description" content="DEAD DROP — A GPS-locked, AES-256 encrypted secret messaging system. Zero backend. Zero server. Everything lives in the URL." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%2300ff41'/><circle cx='16' cy='16' r='6' fill='%23020a02'/><circle cx='16' cy='16' r='2' fill='%2300ff41'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #020a02;
      --panel:       #040f04;
      --green:       #00ff41;
      --green-dim:   #00aa2b;
      --green-faint: #003310;
      --red:         #ff2222;
      --amber:       #ffaa00;
      --text:        #a0ffb0;
      --border:      rgba(0,255,65,0.2);
      --border-hover:rgba(0,255,65,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.018) 2px,
        rgba(0, 255, 65, 0.018) 4px
      );
    }

    /* CRT Vignette */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    }

    /* ── LAYOUT ── */
    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 640px) {
      #app { padding: 40px 20px; }
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeSlideIn 0.6s ease both;
    }

    .logo-line {
      font-family: 'VT323', monospace;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      margin-bottom: 8px;
    }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 900;
      color: var(--green);
      letter-spacing: 0.15em;
      text-shadow: 0 0 10px var(--green), 0 0 30px var(--green-dim), 0 0 60px rgba(0,255,65,0.2);
      line-height: 1;
    }

    .site-subtitle {
      font-family: 'Orbitron', monospace;
      font-size: clamp(9px, 2.5vw, 13px);
      letter-spacing: 0.25em;
      color: var(--green-dim);
      margin-top: 8px;
    }

    .header-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
      margin: 16px 0 0;
      opacity: 0.5;
    }

    /* ── PANEL ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      box-shadow: 0 0 15px rgba(0,255,65,0.05) inset, 0 0 5px rgba(0,255,65,0.1);
      animation: fadeSlideIn 0.5s ease both;
    }

    .panel:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 20px rgba(0,255,65,0.08) inset, 0 0 8px rgba(0,255,65,0.15);
    }

    .step-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .step-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 3vw, 14px);
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
      text-shadow: 0 0 8px rgba(0,255,65,0.5);
    }

    /* ── TEXTAREA ── */
    textarea {
      width: 100%;
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 14px;
      resize: none;
      height: 130px;
      caret-color: var(--green);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }

    textarea::placeholder { color: rgba(160,255,176,0.25); }

    textarea:focus {
      border-color: rgba(0,255,65,0.5);
      box-shadow: 0 0 10px rgba(0,255,65,0.1) inset;
    }

    .char-counter {
      font-size: 11px;
      color: var(--green-dim);
      text-align: right;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    .char-counter.warn { color: var(--amber); }
    .char-counter.over { color: var(--red); }

    /* ── BUTTONS ── */
    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 20px;
      border: 1px solid var(--green-dim);
      background: transparent;
      color: var(--green);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--green);
      transition: left 0.15s ease;
      z-index: -1;
    }

    .btn:hover::before { left: 0; }
    .btn:hover { color: var(--bg); border-color: var(--green); }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-full { width: 100%; justify-content: center; }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-danger::before { background: var(--red); }
    .btn-danger:hover { color: #000; border-color: var(--red); }

    .btn-amber {
      border-color: var(--amber);
      color: var(--amber);
    }
    .btn-amber::before { background: var(--amber); }
    .btn-amber:hover { color: #000; }

    /* ── STATUS LINES ── */
    .status-line {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .status-scanning {
      background: rgba(0,255,65,0.05);
      border: 1px solid rgba(0,255,65,0.15);
      color: var(--green-dim);
    }

    .status-locked {
      background: rgba(0,255,65,0.08);
      border: 1px solid rgba(0,255,65,0.35);
      color: var(--green);
    }

    .status-error {
      background: rgba(255,34,34,0.05);
      border: 1px solid rgba(255,34,34,0.25);
      color: var(--red);
    }

    .status-amber {
      background: rgba(255,170,0,0.05);
      border: 1px solid rgba(255,170,0,0.25);
      color: var(--amber);
    }

    /* ── PULSE DOT ── */
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1s infinite;
      flex-shrink: 0;
    }

    .pulse-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .pulse-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

    /* ── URL BOX ── */
    .url-box {
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green-dim);
      word-break: break-all;
      line-height: 1.8;
      margin-bottom: 14px;
      max-height: 100px;
      overflow-y: auto;
    }

    /* ── WARNING BOX ── */
    .warning-box {
      background: rgba(255,170,0,0.04);
      border: 1px solid rgba(255,170,0,0.2);
      border-radius: 3px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.05em;
      line-height: 1.7;
      margin-top: 12px;
    }

    /* ── COUNTDOWN ── */
    .countdown-display {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      letter-spacing: 0.1em;
      text-align: center;
      margin: 8px 0;
    }

    /* ── RETRIEVE SCREEN ── */
    .transmission-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .info-cell {
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px;
    }

    .info-cell-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--green-dim);
      margin-bottom: 4px;
      font-family: 'Orbitron', monospace;
    }

    .info-cell-value {
      font-size: 14px;
      color: var(--green);
    }

    /* ── MESSAGE REVEAL ── */
    .message-reveal {
      background: rgba(0,255,65,0.05);
      border: 1px solid rgba(0,255,65,0.3);
      border-radius: 3px;
      padding: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      color: var(--green);
      line-height: 1.8;
      min-height: 80px;
      text-shadow: 0 0 6px rgba(0,255,65,0.4);
      position: relative;
    }

    .cursor-blink {
      display: inline-block;
      width: 9px; height: 16px;
      background: var(--green);
      animation: blink 0.7s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    /* ── ACCESS DENIED ── */
    .access-denied {
      text-align: center;
      padding: 10px 0;
    }

    .denied-icon {
      font-family: 'VT323', monospace;
      font-size: 72px;
      color: var(--red);
      display: block;
      text-shadow: 0 0 20px var(--red);
      animation: flicker 3s infinite;
      line-height: 1;
    }

    .denied-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(16px, 5vw, 26px);
      font-weight: 900;
      color: var(--red);
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px var(--red);
      animation: flicker 2.5s infinite 0.3s;
      margin: 8px 0;
    }

    .denied-sub {
      font-size: 13px;
      color: rgba(255,34,34,0.7);
      letter-spacing: 0.1em;
      margin: 6px 0;
    }

    .distance-badge {
      display: inline-block;
      background: rgba(255,34,34,0.1);
      border: 1px solid rgba(255,34,34,0.3);
      border-radius: 3px;
      padding: 8px 16px;
      font-family: 'VT323', monospace;
      font-size: 24px;
      color: var(--red);
      text-shadow: 0 0 8px var(--red);
      margin: 10px 0;
      letter-spacing: 0.1em;
    }

    /* ── BURN COUNTDOWN ── */
    .burn-countdown {
      font-family: 'VT323', monospace;
      font-size: 36px;
      color: var(--red);
      text-align: center;
      text-shadow: 0 0 15px var(--red);
      animation: flicker 1.5s infinite;
      letter-spacing: 0.1em;
    }

    /* ── BURNED / EXPIRED SCREENS ── */
    .terminal-msg {
      text-align: center;
      padding: 20px 0;
    }

    .terminal-msg .icon {
      font-family: 'VT323', monospace;
      font-size: 64px;
      display: block;
      line-height: 1;
      margin-bottom: 12px;
    }

    .terminal-msg .title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 4vw, 20px);
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
    }

    .terminal-msg .sub {
      font-size: 13px;
      color: rgba(160,255,176,0.5);
      letter-spacing: 0.05em;
      line-height: 1.7;
    }

    /* ── ACQUIRING ANIMATION ── */
    .acquiring-text {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--green-dim);
      text-align: center;
      padding: 16px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.3; }
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: '.'; }
    }

    @keyframes titleBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.4; }
    }

    @keyframes scanBar {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    .dots-anim::after {
      content: '.';
      animation: dots 1.2s step-end infinite;
    }

    /* Scan bar effect */
    .scan-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0.3;
      animation: scanBar 4s linear infinite;
      z-index: 9997;
      pointer-events: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

    /* Fade out animation for burn */
    .fade-out {
      animation: fadeOut 1.5s ease forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: scale(0.95); }
    }

    /* Red flash for ACCESS DENIED */
    .red-flash {
      animation: redFlash 0.5s ease;
    }

    @keyframes redFlash {
      0%   { background: rgba(255,34,34,0.3); }
      100% { background: transparent; }
    }

    /* Coords badge */
    .coords-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.08em;
    }

    /* Precision badge */
    .precision-badge {
      display: inline-block;
      font-size: 11px;
      background: rgba(0,255,65,0.08);
      border: 1px solid rgba(0,255,65,0.25);
      border-radius: 2px;
      padding: 2px 8px;
      color: var(--green-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .flex  { display: flex; }
    .gap-8 { gap: 8px; }
    .hidden { display: none !important; }

    /* Page title blink */
    @keyframes titleTab {
      0%, 49% { }
      50%, 100% { }
    }
  </style>
</head>
<body>
  <div class="scan-bar"></div>
  <div id="app"></div>

  <script>
  'use strict';

  // ───────────────────────────────────────────────────────────────────────────
  // PAGE TITLE BLINK
  // ───────────────────────────────────────────────────────────────────────────
  let _titleBlink = true;
  setInterval(() => {
    document.title = _titleBlink ? '// DEAD DROP //' : '▌ DEAD DROP ▌';
    _titleBlink = !_titleBlink;
  }, 900);

  // ───────────────────────────────────────────────────────────────────────────
  // CHECK CRYPTO SUPPORT
  // ───────────────────────────────────────────────────────────────────────────
  if (!window.crypto || !window.crypto.subtle) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:60px 20px;font-family:Orbitron,monospace;color:#ff2222;">
        <div style="font-size:48px;margin-bottom:16px;">⊗</div>
        <div style="font-size:20px;letter-spacing:0.2em;margin-bottom:12px;">BROWSER NOT SUPPORTED</div>
        <div style="font-size:13px;color:#a0ffb0;font-family:'Share Tech Mono',monospace;">
          Web Crypto API required.<br>USE CHROME / FIREFOX / EDGE (HTTPS or localhost)
        </div>
      </div>`;
    throw new Error('Web Crypto API not available');
  }

  // ───────────────────────────────────────────────────────────────────────────
  // UTILS
  // ───────────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function toB64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function fromB64(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    const bin = atob(str);
    return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
  }

  function formatCoord(val, posDir, negDir) {
    const abs = Math.abs(val).toFixed(4);
    return `${abs}°${val >= 0 ? posDir : negDir}`;
  }

  function formatAge(ms) {
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s ago`;
    return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ago`;
  }

  function formatRemaining(expiry) {
    const diff = expiry - Date.now();
    if (diff <= 0) return 'EXPIRED';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // ───────────────────────────────────────────────────────────────────────────
  // HAVERSINE
  // ───────────────────────────────────────────────────────────────────────────
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const p1 = lat1 * Math.PI / 180;
    const p2 = lat2 * Math.PI / 180;
    const dp = (lat2 - lat1) * Math.PI / 180;
    const dl = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dp/2) ** 2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ───────────────────────────────────────────────────────────────────────────
  // CRYPTO
  // ───────────────────────────────────────────────────────────────────────────
  async function deriveKey(lat, lng) {
    const rawKey = `${lat.toFixed(4)}:${lng.toFixed(4)}`;
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(rawKey),
      { name: 'PBKDF2' },
      false,
      ['deriveKey']
    );
    return await crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: new TextEncoder().encode('deaddrop-salt-v1'),
        iterations: 100000,
        hash: 'SHA-256'
      },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptMessage(message, lat, lng) {
    const key = await deriveKey(lat, lng);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ciphertext = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv },
      key,
      new TextEncoder().encode(message)
    );
    return { ciphertext, iv };
  }

  async function decryptMessage(payload, lat, lng) {
    const key = await deriveKey(lat, lng);
    const iv = new Uint8Array(fromB64(payload.i));
    const ct = fromB64(payload.c);
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      ct
    );
    return new TextDecoder().decode(plain);
  }

  // ───────────────────────────────────────────────────────────────────────────
  // URL PAYLOAD
  // ───────────────────────────────────────────────────────────────────────────
  function encodePayload(payload) {
    return btoa(JSON.stringify(payload))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function decodePayload(hash) {
    try {
      let str = hash.startsWith('#') ? hash.slice(1) : hash;
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      return JSON.parse(atob(str));
    } catch { return null; }
  }

  // ───────────────────────────────────────────────────────────────────────────
  // ROUTER
  // ───────────────────────────────────────────────────────────────────────────
  function route() {
    const hash = window.location.hash;
    if (hash === '#burned') {
      renderBurned();
    } else if (hash && hash.length > 1) {
      renderRetrieve(hash);
    } else {
      renderDrop();
    }
  }

  // ───────────────────────────────────────────────────────────────────────────
  // TYPEWRITER
  // ───────────────────────────────────────────────────────────────────────────
  function typewriter(el, text, delay = 30, cb) {
    let i = 0;
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);

    const tick = () => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        setTimeout(tick, delay);
      } else {
        cursor.remove();
        if (cb) cb();
      }
    };
    tick();
  }

  // ───────────────────────────────────────────────────────────────────────────
  // SHARED HEADER
  // ───────────────────────────────────────────────────────────────────────────
  function headerHTML(subtitle) {
    return `
      <header class="site-header">
        <div class="logo-line">[ CLASSIFIED SYSTEM ]</div>
        <div class="site-title">DEAD DROP</div>
        <div class="site-subtitle">${subtitle}</div>
        <div class="header-divider"></div>
      </header>`;
  }

  // ───────────────────────────────────────────────────────────────────────────
  // ── DROP MODE ──
  // ───────────────────────────────────────────────────────────────────────────
  function renderDrop() {
    const app = document.getElementById('app');
    app.innerHTML = headerHTML('// ENCRYPT TRANSMISSION') + `

      <!-- STEP 01: COMPOSE -->
      <div class="panel" style="animation-delay:0.05s">
        <div class="step-label">01 / COMPOSE</div>
        <div class="step-title">ENTER TRANSMISSION</div>
        <textarea id="msg-input"
          maxlength="500"
          placeholder="ENTER TRANSMISSION..."
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <div class="char-counter" id="char-count">0 / 500 CHARS</div>
      </div>

      <!-- STEP 02: ACQUIRE -->
      <div class="panel" style="animation-delay:0.1s">
        <div class="step-label">02 / ACQUIRE LOCATION</div>
        <div class="step-title">COORDINATE LOCK</div>
        <button class="btn btn-full" id="btn-acquire">
          [ ACQUIRE COORDINATES ]
        </button>
        <div id="gps-status" class="mt-12"></div>
      </div>

      <!-- STEP 03: ENCRYPT -->
      <div class="panel" style="animation-delay:0.15s">
        <div class="step-label">03 / ENCRYPT</div>
        <div class="step-title">GENERATE DEAD DROP</div>
        <button class="btn btn-full" id="btn-encrypt" disabled>
          [ ENCRYPT &amp; GENERATE DEAD DROP ]
        </button>
        <div id="encrypt-status" class="mt-12"></div>
      </div>

      <!-- STEP 04: RESULT -->
      <div class="panel hidden" id="result-panel" style="animation-delay:0.2s">
        <div class="step-label">04 / TRANSMIT</div>
        <div class="step-title">DEAD DROP READY</div>
        <div class="url-box" id="result-url"></div>
        <div class="flex gap-8">
          <button class="btn btn-full" id="btn-copy">[ COPY LINK ]</button>
        </div>
        <div style="text-align:center;margin-top:16px;">
          <div style="font-size:11px;color:var(--green-dim);letter-spacing:0.15em;margin-bottom:4px;">DROP EXPIRES IN</div>
          <div class="countdown-display" id="drop-countdown">23:59:47</div>
        </div>
        <div class="warning-box" id="warn-box"></div>
      </div>
    `;

    // ── Wire up events ──
    let lockedLat = null, lockedLng = null;
    let watchId = null;
    let countdownInterval = null;

    // Char counter
    const msgInput = $('msg-input');
    const charCount = $('char-count');
    msgInput.addEventListener('input', () => {
      const len = msgInput.value.length;
      charCount.textContent = `${len} / 500 CHARS`;
      charCount.className = 'char-counter' + (len > 450 ? (len >= 500 ? ' over' : ' warn') : '');
      checkReady();
    });

    // Check if ready to encrypt
    function checkReady() {
      const hasMsg  = msgInput.value.trim().length > 0;
      const hasLoc  = lockedLat !== null;
      $('btn-encrypt').disabled = !(hasMsg && hasLoc);
    }

    // GPS Acquire
    $('btn-acquire').addEventListener('click', () => {
      if (!navigator.geolocation) {
        showGpsStatus('error', 'GEOLOCATION NOT AVAILABLE IN THIS BROWSER');
        return;
      }
      $('btn-acquire').disabled = true;
      showGpsStatus('scanning', 'SCANNING<span class="dots-anim"></span>');

      watchId = navigator.geolocation.watchPosition(
        pos => {
          const acc = pos.coords.accuracy;
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          if (acc <= 50) {
            // Lock acquired
            if (watchId !== null) {
              navigator.geolocation.clearWatch(watchId);
              watchId = null;
            }
            lockedLat = lat;
            lockedLng = lng;
            $('btn-acquire').textContent = '[ RE-ACQUIRE ]';
            $('btn-acquire').disabled = false;
            showGpsStatus('locked',
              `<div class="coords-badge">◉ COORDINATES LOCKED</div>
               <div style="margin-top:6px;font-size:12px;">${formatCoord(lat,'N','S')} &nbsp; ${formatCoord(lng,'E','W')}</div>
               <div><span class="precision-badge">PRECISION: ±${Math.round(acc)}m</span></div>`
            );
            checkReady();
          } else {
            showGpsStatus('scanning',
              `<div class="flex gap-8" style="align-items:center;">
                <div class="pulse-dot"></div>
                <div>SIGNAL STRENGTH: ${Math.round(acc)}m
                  ${acc < 100 ? '▓' : '░'}${acc < 80 ? '▓' : '░'}${acc < 60 ? '▓' : '░'}${acc <= 50 ? '▓' : '░'}
                  ${acc <= 50 ? '✓' : '— WAITING FOR LOCK'}
                </div>
               </div>`
            );
          }
        },
        err => {
          if (watchId !== null) navigator.geolocation.clearWatch(watchId);
          $('btn-acquire').disabled = false;
          handleGpsError(err, 'gps-status');
        },
        { enableHighAccuracy: true, maximumAge: 0 }
      );
    });

    function showGpsStatus(type, html) {
      const el = $('gps-status');
      el.className = `status-line status-${type === 'locked' ? 'locked' : type === 'error' ? 'error' : 'scanning'}`;
      el.innerHTML = html;
    }

    // Encrypt
    $('btn-encrypt').addEventListener('click', async () => {
      const message = msgInput.value.trim();
      if (!message || lockedLat === null) return;

      const es = $('encrypt-status');
      es.className = 'status-line status-scanning';
      es.innerHTML = '<div class="pulse-dot"></div> ENCRYPTING WITH AES-256-GCM<span class="dots-anim"></span>';
      $('btn-encrypt').disabled = true;

      try {
        const { ciphertext, iv } = await encryptMessage(message, lockedLat, lockedLng);
        const expiry = Date.now() + 86400000;
        const payload = {
          v: 1,
          c: toB64(ciphertext),
          i: toB64(iv.buffer),
          la: parseFloat(lockedLat.toFixed(4)),
          ln: parseFloat(lockedLng.toFixed(4)),
          r: 100,
          e: expiry,
          t: Date.now()
        };

        const encoded = encodePayload(payload);
        const finalURL = window.location.origin + window.location.pathname + '#' + encoded;

        es.className = 'status-line status-locked';
        es.innerHTML = '<div class="pulse-dot"></div> ENCRYPTION COMPLETE — DROP READY';

        // Show result
        const resultPanel = $('result-panel');
        resultPanel.classList.remove('hidden');
        $('result-url').textContent = finalURL;

        // Countdown
        if (countdownInterval) clearInterval(countdownInterval);
        const updateCountdown = () => {
          $('drop-countdown').textContent = formatRemaining(expiry);
        };
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);

        // Warning
        $('warn-box').innerHTML = `
          ⚠ THIS URL IS YOUR ONLY COPY.<br>
          STORE NOWHERE. SHARE ONCE. BURNS ON READ.`;

        // Copy button
        $('btn-copy').addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(finalURL);
          } catch {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = finalURL;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          $('btn-copy').textContent = '✓ COPIED — SHARE AND DESTROY';
          setTimeout(() => { $('btn-copy').textContent = '[ COPY LINK ]'; }, 3000);
        });

        resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (err) {
        es.className = 'status-line status-error';
        es.innerHTML = `⊗ ENCRYPTION FAILED: ${err.message}`;
        $('btn-encrypt').disabled = false;
      }
    });
  }

  // ───────────────────────────────────────────────────────────────────────────
  // GPS ERROR HANDLER
  // ───────────────────────────────────────────────────────────────────────────
  function handleGpsError(err, statusId) {
    const el = $(statusId);
    el.className = 'status-line status-error';
    switch (err.code) {
      case 1:
        el.innerHTML = '⊗ LOCATION ACCESS DENIED — CANNOT VERIFY IDENTITY';
        break;
      case 2:
        el.innerHTML = '⊗ SIGNAL LOST — RETRY IN OPEN AREA';
        break;
      case 3:
        el.innerHTML = '⊗ SIGNAL TIMEOUT — RETRYING...';
        break;
      default:
        el.innerHTML = `⊗ GPS ERROR: ${err.message}`;
    }
  }

  // ───────────────────────────────────────────────────────────────────────────
  // ── RETRIEVE MODE ──
  // ───────────────────────────────────────────────────────────────────────────
  function renderRetrieve(hash) {
    const app = document.getElementById('app');
    const payload = decodePayload(hash);

    if (!payload || payload.v !== 1) {
      app.innerHTML = headerHTML('// INVALID TRANSMISSION') + `
        <div class="panel">
          <div class="terminal-msg">
            <span class="icon" style="color:var(--red);">⊗</span>
            <div class="title" style="color:var(--red);">TRANSMISSION CORRUPT</div>
            <div class="sub">The URL payload could not be decoded.<br>Data may be corrupted or tampered.</div>
            <div class="mt-16"><a href="${window.location.pathname}" style="color:var(--green-dim);font-size:12px;letter-spacing:0.1em;">[ CREATE NEW DROP ]</a></div>
          </div>
        </div>`;
      return;
    }

    // Check expiry
    if (payload.e <= Date.now()) {
      const ago = formatAge(payload.e);
      app.innerHTML = headerHTML('// INCOMING TRANSMISSION') + `
        <div class="panel">
          <div class="terminal-msg">
            <span class="icon" style="color:var(--red);">⊗</span>
            <div class="title" style="color:var(--red);">TRANSMISSION EXPIRED</div>
            <div class="sub">THIS DROP SELF-DESTRUCTED ${ago.toUpperCase()}<br>No data can be recovered.</div>
            <div class="mt-16"><a href="${window.location.pathname}" style="color:var(--green-dim);font-size:12px;letter-spacing:0.1em;">[ CREATE NEW DROP ]</a></div>
          </div>
        </div>`;
      return;
    }

    // Render retrieve UI
    app.innerHTML = headerHTML('// INCOMING TRANSMISSION') + `

      <!-- STEP 01: INFO -->
      <div class="panel" style="animation-delay:0.05s">
        <div class="step-label">01 / TRANSMISSION DETECTED</div>
        <div class="step-title">SIGNAL ACQUIRED</div>
        <div class="transmission-info">
          <div class="info-cell">
            <div class="info-cell-label">CREATED</div>
            <div class="info-cell-value" id="info-created">—</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">EXPIRES IN</div>
            <div class="info-cell-value" id="info-expires">—</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">VERSION</div>
            <div class="info-cell-value">v${payload.v}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">RADIUS</div>
            <div class="info-cell-value">${payload.r}m</div>
          </div>
        </div>
      </div>

      <!-- STEP 02: VERIFY -->
      <div class="panel" style="animation-delay:0.1s" id="verify-panel">
        <div class="step-label">02 / VERIFY LOCATION</div>
        <div class="step-title">LOCATION AUTHENTICATION REQUIRED</div>
        <button class="btn btn-full" id="btn-verify">
          [ VERIFY COORDINATES ]
        </button>
        <div id="verify-status" class="mt-12"></div>
      </div>

      <!-- STEP 03: RESULT -->
      <div class="panel hidden" id="msg-panel" style="animation-delay:0.15s">
        <div class="step-label">03 / DECRYPTED</div>
        <div class="step-title">TRANSMISSION CONTENT</div>
        <div class="message-reveal" id="msg-reveal"></div>
        <div class="burn-countdown hidden" id="burn-cd"></div>
      </div>
    `;

    // Info countdown
    const updateInfo = () => {
      const el = $('info-expires');
      const cr = $('info-created');
      if (el) el.textContent = formatRemaining(payload.e);
      if (cr) cr.textContent = formatAge(payload.t).toUpperCase();
    };
    updateInfo();
    const infoInterval = setInterval(updateInfo, 1000);

    let retryCount = 0;
    const MAX_RETRY = 3;

    function acquireAndVerify() {
      const vs = $('verify-status');
      $('btn-verify').disabled = true;
      vs.className = 'status-line status-scanning';
      vs.innerHTML = `<div class="pulse-dot"></div> TRIANGULATING POSITION<span class="dots-anim"></span>`;

      navigator.geolocation.getCurrentPosition(
        async pos => {
          const userLat = pos.coords.latitude;
          const userLng = pos.coords.longitude;
          const dist = haversine(userLat, userLng, payload.la, payload.ln);

          vs.className = 'status-line status-scanning';
          vs.innerHTML = `<div class="pulse-dot"></div> POSITION ACQUIRED — VERIFYING<span class="dots-anim"></span>`;

          if (dist <= payload.r) {
            // LOCATION VERIFIED
            vs.className = 'status-line status-locked';
            vs.innerHTML = '◉ LOCATION VERIFIED — DECRYPTING...';
            clearInterval(infoInterval);

            try {
              const decrypted = await decryptMessage(payload, payload.la, payload.ln);

              const msgPanel = $('msg-panel');
              msgPanel.classList.remove('hidden');

              const msgReveal = $('msg-reveal');
              typewriter(msgReveal, decrypted, 28, () => {
                // Start burn countdown
                const burnEl = $('burn-cd');
                burnEl.classList.remove('hidden');
                let n = 5;
                burnEl.textContent = `BURNING IN ${n}...`;
                $('verify-panel').querySelector('.step-title').textContent = 'TRANSMISSION RECEIVED';

                const burnTimer = setInterval(() => {
                  n--;
                  if (n > 0) {
                    burnEl.textContent = `BURNING IN ${n}...`;
                  } else {
                    clearInterval(burnTimer);
                    burnEl.textContent = 'BURNED.';
                    msgPanel.classList.add('fade-out');
                    setTimeout(() => {
                      history.replaceState(null, '', '#burned');
                      renderBurned();
                    }, 1500);
                  }
                }, 1000);
              });

              msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (e) {
              vs.className = 'status-line status-error';
              vs.innerHTML = `⊗ DECRYPTION FAILED: ${e.message}`;
              $('btn-verify').disabled = false;
            }

          } else {
            // ACCESS DENIED
            const distOff = Math.round(dist - payload.r);
            clearInterval(infoInterval);

            document.body.style.animation = 'none';
            document.getElementById('verify-panel').classList.add('red-flash');

            vs.className = 'status-line status-error';
            vs.innerHTML = '';

            const msgPanel = $('msg-panel');
            msgPanel.classList.remove('hidden');

            const msgReveal = $('msg-reveal');
            msgReveal.style.cssText = 'background:rgba(255,34,34,0.03);border-color:rgba(255,34,34,0.3);';
            msgReveal.innerHTML = `
              <div class="access-denied">
                <span class="denied-icon">⊗</span>
                <div class="denied-title">ACCESS DENIED</div>
                <div class="denied-sub">COORDINATES DO NOT MATCH DROP POINT</div>
                <div class="distance-badge">YOU ARE ${distOff}m OFF TARGET</div>
                <div class="denied-sub" style="font-size:11px;margin-top:8px;">MOVE CLOSER AND RETRY</div>
              </div>`;

            $('btn-verify').textContent = '[ RETRY — MOVE CLOSER ]';
            $('btn-verify').disabled = false;

            msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        },
        err => {
          retryCount++;
          if (err.code === 3 && retryCount < MAX_RETRY) {
            $('verify-status').innerHTML = `<div class="pulse-dot amber"></div> SIGNAL TIMEOUT — RETRYING (${retryCount}/${MAX_RETRY})<span class="dots-anim"></span>`;
            setTimeout(acquireAndVerify, 1500);
          } else {
            handleGpsError(err, 'verify-status');
            $('btn-verify').disabled = false;
          }
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
      );
    }

    $('btn-verify').addEventListener('click', () => {
      retryCount = 0;
      acquireAndVerify();
    });
  }

  // ───────────────────────────────────────────────────────────────────────────
  // ── BURNED SCREEN ──
  // ───────────────────────────────────────────────────────────────────────────
  function renderBurned() {
    const app = document.getElementById('app');
    app.innerHTML = headerHTML('// TRANSMISSION DESTROYED') + `
      <div class="panel">
        <div class="terminal-msg">
          <span class="icon" style="color:var(--red);">⊗</span>
          <div class="title" style="color:var(--red);">TRANSMISSION ALREADY BURNED</div>
          <div class="sub">
            THIS MESSAGE WAS READ AND DESTROYED.<br>
            NO TRACE REMAINS. OPERATION COMPLETE.
          </div>
          <div class="mt-16">
            <a href="${window.location.pathname}" style="color:var(--green-dim);font-size:12px;letter-spacing:0.1em;text-decoration:none;border:1px solid rgba(0,255,65,0.25);padding:10px 20px;font-family:Orbitron,monospace;display:inline-block;transition:all 0.15s;" onmouseover="this.style.background='var(--green)';this.style.color='#020a02';" onmouseout="this.style.background='transparent';this.style.color='var(--green-dim)';">
              [ CREATE NEW DROP ]
            </a>
          </div>
        </div>
      </div>
      <div class="panel" style="animation-delay:0.1s">
        <div style="font-size:11px;color:rgba(160,255,176,0.3);letter-spacing:0.1em;line-height:2;font-family:'Share Tech Mono',monospace;">
          ✓ AES-256-GCM ENCRYPTION VERIFIED<br>
          ✓ ZERO SERVER COMMUNICATION<br>
          ✓ LOCATION KEY NEVER TRANSMITTED<br>
          ✓ HASH FRAGMENT NEVER SENT TO SERVER<br>
          ✓ OPERATION COMPLETE — NO TRACE
        </div>
      </div>`;
  }

  // ───────────────────────────────────────────────────────────────────────────
  // INIT
  // ───────────────────────────────────────────────────────────────────────────
  route();
  window.addEventListener('hashchange', route);
  </script>
</body>
</html>
