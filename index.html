<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>// DEAD DROP //</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=VT323&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #020a02;
      --panel: #040f04;
      --green: #00ff41;
      --green-dim: #00aa2b;
      --green-faint: #001a00;
      --red: #ff2222;
      --amber: #ffaa00;
      --text: #a0ffb0;
      --border: rgba(0, 255, 65, 0.2);
      --glow: 0 0 10px #00ff41, 0 0 20px #00aa2b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* CRT effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 65, 0.013) 2px, rgba(0, 255, 65, 0.013) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Header */
    #header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 255, 65, 0.02);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: var(--green);
      text-shadow: var(--glow);
    }

    .logo span {
      color: var(--red);
      text-shadow: 0 0 15px var(--red);
    }

    .status {
      font-size: 0.6rem;
      color: var(--green-dim);
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    /* Main */
    #app {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* Panels */
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 24px;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease forwards;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.05) inset;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .step-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      margin-bottom: 8px;
    }

    .step-title {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: var(--green);
      margin-bottom: 16px;
      text-shadow: 0 0 8px var(--green-dim);
    }

    /* Inputs */
    textarea,
    input[type=text] {
      width: 100%;
      background: var(--green-faint);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 12px;
      outline: none;
      resize: none;
      caret-color: var(--green);
      letter-spacing: 0.05em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus,
    input[type=text]:focus {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
    }

    textarea {
      height: 120px;
    }

    textarea::placeholder,
    input::placeholder {
      color: var(--green-dim);
      opacity: 0.6;
    }

    .char-counter {
      text-align: right;
      font-size: 0.65rem;
      color: var(--green-dim);
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--green-dim);
    }

    .btn:hover:not(:disabled) {
      background: var(--green);
      color: #000;
      box-shadow: var(--glow);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-full {
      width: 100%;
      text-align: center;
      display: block;
    }

    .btn-red {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-red:hover:not(:disabled) {
      background: var(--red);
      color: #000;
      box-shadow: 0 0 15px var(--red);
    }

    .btn-amber {
      border-color: var(--amber);
      color: var(--amber);
    }

    /* Map */
    #map-container {
      height: 320px;
      width: 100%;
      margin: 12px 0;
      border: 1px solid var(--border);
      filter: invert(1) hue-rotate(180deg) brightness(0.75) saturate(1.5);
      cursor: crosshair;
    }

    .leaflet-container {
      background: #000;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-row input {
      flex: 1;
    }

    .search-row .btn {
      padding: 12px 16px;
      white-space: nowrap;
    }

    .coord-status {
      padding: 10px 14px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      background: var(--green-faint);
      margin-top: 8px;
    }

    .coord-status.locked {
      border-color: var(--green);
      color: var(--green);
    }

    .coord-status.waiting {
      color: var(--green-dim);
    }

    /* Loading steps */
    .loading-steps {
      padding: 8px 0;
    }

    .load-step {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 6px 0;
      color: var(--green-dim);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .load-step.visible {
      opacity: 1;
    }

    .load-step.done {
      color: var(--green);
    }

    .load-step.done::before {
      content: '✓ ';
    }

    .load-step.active::before {
      content: '▸ ';
    }

    /* Result box */
    .result-url {
      background: var(--green-faint);
      border: 1px solid var(--green);
      padding: 14px;
      font-size: 0.7rem;
      word-break: break-all;
      letter-spacing: 0.05em;
      line-height: 1.6;
      margin: 12px 0;
      max-height: 80px;
      overflow-y: auto;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .info-item {
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    .info-item .label {
      color: var(--green-dim);
      margin-bottom: 4px;
    }

    .info-item .value {
      color: var(--green);
    }

    .warning-box {
      border: 1px solid var(--amber);
      padding: 14px;
      font-size: 0.7rem;
      color: var(--amber);
      letter-spacing: 0.08em;
      line-height: 1.6;
      margin: 12px 0;
      background: rgba(255, 170, 0, 0.05);
    }

    /* Retrieve screens */
    .transmission-info {
      margin: 12px 0;
    }

    .t-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .t-row:last-child {
      border-bottom: none;
    }

    .t-key {
      color: var(--green-dim);
      min-width: 160px;
    }

    .t-val {
      color: var(--green);
    }

    /* GPS status */
    .gps-status {
      text-align: center;
      padding: 32px;
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
    }

    .gps-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% {
        content: ''
      }

      25% {
        content: '.'
      }

      50% {
        content: '..'
      }

      75% {
        content: '...'
      }

      100% {
        content: ''
      }
    }

    /* Message reveal */
    #msg-panel {
      display: none;
    }

    .msg-box {
      border: 1px solid var(--green);
      padding: 20px;
      font-size: 0.85rem;
      line-height: 1.8;
      letter-spacing: 0.08em;
      min-height: 80px;
      background: var(--green-faint);
      box-shadow: var(--glow);
      margin: 16px 0;
    }

    .burn-countdown {
      text-align: center;
      font-family: 'VT323', monospace;
      font-size: 1.8rem;
      color: var(--red);
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px var(--red);
      animation: flicker 3s infinite;
    }

    /* ACCESS DENIED */
    .denied-screen {
      text-align: center;
      padding: 40px 20px;
      animation: flicker 0.5s ease;
    }

    .denied-big {
      font-family: 'VT323', monospace;
      font-size: 4rem;
      color: var(--red);
      text-shadow: 0 0 30px var(--red);
      animation: flicker 2s infinite;
      letter-spacing: 0.1em;
    }

    .denied-sub {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--red);
      margin: 12px 0;
      opacity: 0.8;
    }

    .denied-dist {
      font-size: 0.8rem;
      color: var(--text);
      margin: 16px 0;
      letter-spacing: 0.1em;
    }

    /* Expired / burned */
    .special-screen {
      text-align: center;
      padding: 40px 20px;
    }

    .special-icon {
      font-family: 'VT323', monospace;
      font-size: 5rem;
      color: var(--amber);
      text-shadow: 0 0 20px var(--amber);
    }

    .special-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      margin: 12px 0;
    }

    .special-sub {
      font-size: 0.75rem;
      color: var(--text);
      letter-spacing: 0.1em;
      line-height: 1.6;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      93% {
        opacity: 0.3
      }

      94% {
        opacity: 1
      }

      96% {
        opacity: 0.5
      }

      97% {
        opacity: 1
      }
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    /* Verify btn area */
    .verify-area {
      text-align: center;
      padding: 20px 0;
    }

    /* Success flash */
    @keyframes successFlash {
      0% {
        background: rgba(0, 255, 65, 0.2)
      }

      100% {
        background: transparent
      }
    }

    .success-flash {
      animation: successFlash 1s ease forwards;
    }

    /* Responsive */
    @media(max-width:480px) {
      #app {
        padding: 16px 12px 40px;
      }

      .panel {
        padding: 16px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .denied-big {
        font-size: 3rem;
      }

      #map-container {
        height: 250px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--green-dim);
    }

    /* Copy success */
    .copy-success {
      color: #000 !important;
      background: var(--green) !important;
      box-shadow: var(--glow);
    }
  </style>
</head>

<body>

  <div id="header">
    <div class="logo">DEAD<span>▮</span>DROP</div>
    <div class="status">
      <span class="dot"></span>
      <span id="mode-label">INITIALIZING...</span>
    </div>
  </div>

  <div id="app">
    <!-- Content injected by JS -->
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ═══════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════
    const state = {
      mode: null,        // 'drop' | 'retrieve'
      message: '',
      dropLat: null,
      dropLng: null,
      map: null,
      marker: null,
      payload: null
    };

    // ═══════════════════════════════════════
    // UTILS
    // ═══════════════════════════════════════
    function toBase64Url(buffer) {
      return btoa(String.fromCharCode(...new Uint8Array(buffer)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
    function fromBase64Url(str) {
      const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64.length % 4 ? b64 + '='.repeat(4 - b64.length % 4) : b64;
      const bin = atob(pad);
      return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
    }
    function formatCoords(lat, lng) {
      const ns = lat >= 0 ? 'N' : 'S';
      const ew = lng >= 0 ? 'E' : 'W';
      return `${Math.abs(lat).toFixed(4)}°${ns}  ${Math.abs(lng).toFixed(4)}°${ew}`;
    }
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }
    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000), h = Math.floor(m / 60);
      if (h > 0) return `${h}H ${m % 60}M AGO`;
      if (m > 0) return `${m}M AGO`;
      return 'JUST NOW';
    }
    function timeUntil(ts) {
      const diff = ts - Date.now();
      if (diff <= 0) return 'EXPIRED';
      const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
      return `${h}H ${m}M`;
    }
    function $(id) { return document.getElementById(id); }

    // ═══════════════════════════════════════
    // CRYPTO
    // ═══════════════════════════════════════
    async function deriveKey(lat, lng) {
      const rawKey = `${parseFloat(lat).toFixed(4)}:${parseFloat(lng).toFixed(4)}`;
      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(rawKey),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: new TextEncoder().encode('deaddrop-salt-v1'), iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
      );
    }

    async function encryptMessage(message, lat, lng) {
      const key = await deriveKey(lat, lng);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, new TextEncoder().encode(message)
      );
      return {
        v: 1,
        c: toBase64Url(ciphertext),
        i: toBase64Url(iv.buffer),
        la: parseFloat(parseFloat(lat).toFixed(4)),
        ln: parseFloat(parseFloat(lng).toFixed(4)),
        r: 100,
        e: Date.now() + 86400000,
        t: Date.now()
      };
    }

    async function decryptMessage(payload, userLat, userLng) {
      const key = await deriveKey(payload.la, payload.ln);
      const iv = new Uint8Array(fromBase64Url(payload.i));
      const ct = fromBase64Url(payload.c);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(plain);
    }

    // ═══════════════════════════════════════
    // ROUTER
    // ═══════════════════════════════════════
    function route() {
      const hash = window.location.hash.slice(1);
      if (!hash) {
        state.mode = 'drop';
        renderDrop();
      } else if (hash === 'burned') {
        renderBurned();
      } else {
        try {
          const json = atob(hash.replace(/-/g, '+').replace(/_/g, '/').replace(/([^=])$/, (m) => m.length % 4 ? m + '='.repeat(4 - m.length % 4) : m));
          state.payload = JSON.parse(json);
          state.mode = 'retrieve';
          renderRetrieve();
        } catch (e) {
          renderInvalid();
        }
      }
    }

    // ═══════════════════════════════════════
    // DROP SCREEN
    // ═══════════════════════════════════════
    function renderDrop() {
      $('mode-label').textContent = 'ENCRYPT TRANSMISSION';
      $('app').innerHTML = `
    <div class="panel" style="animation-delay:0.05s">
      <div class="step-label">01 / COMPOSE</div>
      <div class="step-title">ENTER TRANSMISSION</div>
      <textarea id="msg-input" placeholder="ENTER TRANSMISSION..." maxlength="500"></textarea>
      <div class="char-counter"><span id="char-count">0</span> / 500 CHARS</div>
    </div>

    <div class="panel" style="animation-delay:0.1s">
      <div class="step-label">02 / SET DROP POINT</div>
      <div class="step-title">PIN LOCATION ON MAP</div>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="SEARCH ADDRESS OR PLACE...">
        <button class="btn" id="search-btn">[ LOCATE ]</button>
      </div>
      <div id="map-container"></div>
      <div class="coord-status waiting" id="coord-display">
        ▸ CLICK MAP TO SET DROP POINT
      </div>
    </div>

    <div class="panel" style="animation-delay:0.15s">
      <div class="step-label">03 / ENCRYPT</div>
      <div class="step-title">GENERATE DEAD DROP</div>
      <button class="btn btn-full" id="encrypt-btn" disabled>[ ENCRYPT & GENERATE DEAD DROP ]</button>
      <div id="loading-steps" class="loading-steps" style="display:none">
        <div class="load-step" id="ls1">DERIVING KEY FROM COORDINATES...</div>
        <div class="load-step" id="ls2">ENCRYPTING WITH AES-256-GCM...</div>
        <div class="load-step" id="ls3">ENCODING PAYLOAD...</div>
        <div class="load-step" id="ls4">GENERATING LINK...</div>
      </div>
    </div>

    <div class="panel" id="result-panel" style="display:none;animation-delay:0.2s">
      <div class="step-label">04 / RESULT</div>
      <div class="step-title">DEAD DROP GENERATED</div>
      <div class="result-url" id="result-url"></div>
      <button class="btn btn-full" id="copy-btn">[ COPY LINK ]</button>
      <div class="info-grid" id="info-grid"></div>
      <div class="warning-box">
        ⚠ THIS TRANSMISSION SELF-DESTRUCTS AFTER ONE READ<br>
        SHARE THIS LINK THROUGH A SECURE CHANNEL ONLY<br>
        DO NOT STORE THIS URL ANYWHERE
      </div>
      <button class="btn btn-full" id="reset-btn" style="margin-top:8px">[ DROP ANOTHER ]</button>
    </div>
  `;

      initMap();
      bindDropEvents();
    }

    function initMap() {
      if (!window.L) { showMapFallback(); return; }
      try {
        state.map = L.map('map-container', {
          center: [20.5937, 78.9629],
          zoom: 5,
          zoomControl: true,
          attributionControl: false
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19
        }).addTo(state.map);

        const greenIcon = L.divIcon({
          className: '',
          html: `<div style="width:18px;height:18px;background:#00ff41;border:2px solid #000;border-radius:50%;box-shadow:0 0 15px #00ff41,0 0 30px #00aa2b;"></div>`,
          iconSize: [18, 18], iconAnchor: [9, 9]
        });

        state.map.on('click', (e) => {
          state.dropLat = parseFloat(e.latlng.lat.toFixed(4));
          state.dropLng = parseFloat(e.latlng.lng.toFixed(4));
          if (state.marker) state.map.removeLayer(state.marker);
          state.marker = L.marker([state.dropLat, state.dropLng], { icon: greenIcon }).addTo(state.map);
          const cd = $('coord-display');
          cd.className = 'coord-status locked';
          cd.innerHTML = `◉ DROP POINT LOCKED &nbsp;|&nbsp; ${formatCoords(state.dropLat, state.dropLng)}`;
          checkReady();
        });
      } catch (e) { showMapFallback(); }
    }

    function showMapFallback() {
      const mc = $('map-container');
      if (!mc) return;
      mc.style.filter = 'none';
      mc.style.background = 'var(--green-faint)';
      mc.style.display = 'flex';
      mc.style.flexDirection = 'column';
      mc.style.alignItems = 'center';
      mc.style.justifyContent = 'center';
      mc.style.gap = '12px';
      mc.innerHTML = `
    <div style="color:var(--amber);font-size:0.7rem;letter-spacing:0.2em">MAP UNAVAILABLE — ENTER COORDINATES MANUALLY</div>
    <div style="display:flex;gap:12px;width:90%">
      <input type="text" id="manual-lat" placeholder="LATITUDE (e.g. 11.2345)" style="flex:1">
      <input type="text" id="manual-lng" placeholder="LONGITUDE (e.g. 78.9876)" style="flex:1">
    </div>
    <button class="btn" onclick="setManualCoords()">[ SET COORDINATES ]</button>
  `;
    }

    window.setManualCoords = function () {
      const lat = parseFloat($('manual-lat').value);
      const lng = parseFloat($('manual-lng').value);
      if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
        alert('INVALID COORDINATES'); return;
      }
      state.dropLat = parseFloat(lat.toFixed(4));
      state.dropLng = parseFloat(lng.toFixed(4));
      const cd = $('coord-display');
      cd.className = 'coord-status locked';
      cd.innerHTML = `◉ DROP POINT LOCKED &nbsp;|&nbsp; ${formatCoords(state.dropLat, state.dropLng)}`;
      checkReady();
    }

    function bindDropEvents() {
      const msgInput = $('msg-input');
      const charCount = $('char-count');
      msgInput.addEventListener('input', () => {
        state.message = msgInput.value;
        charCount.textContent = state.message.length;
        checkReady();
      });

      $('search-btn').addEventListener('click', doSearch);
      $('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

      $('encrypt-btn').addEventListener('click', doEncrypt);
      $('reset-btn') && $('reset-btn').addEventListener('click', () => {
        state.dropLat = null; state.dropLng = null; state.marker = null; state.map = null;
        renderDrop();
      });
    }

    function checkReady() {
      const btn = $('encrypt-btn');
      if (!btn) return;
      btn.disabled = !(state.message.trim().length > 0 && state.dropLat !== null);
    }

    async function doSearch() {
      const q = $('search-input').value.trim();
      if (!q || !state.map) return;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
        const data = await res.json();
        if (data && data[0]) {
          state.map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14);
        } else {
          $('coord-display').textContent = '⊗ LOCATION NOT FOUND — TRY DIFFERENT QUERY';
        }
      } catch (e) {
        $('coord-display').textContent = '⊗ SEARCH FAILED — CHECK CONNECTION';
      }
    }

    async function doEncrypt() {
      if (!state.message.trim() || state.dropLat === null) return;
      const btn = $('encrypt-btn');
      btn.disabled = true;
      const ls = $('loading-steps');
      ls.style.display = 'block';

      const steps = ['ls1', 'ls2', 'ls3', 'ls4'];
      for (let i = 0; i < steps.length; i++) {
        const el = $(steps[i]);
        el.classList.add('visible', 'active');
        await sleep(400);
        el.classList.remove('active');
        el.classList.add('done');
      }

      try {
        const payload = await encryptMessage(state.message.trim(), state.dropLat, state.dropLng);
        const encoded = btoa(JSON.stringify(payload))
          .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        const finalURL = window.location.origin + window.location.pathname + '#' + encoded;

        const rp = $('result-panel');
        rp.style.display = 'block';
        rp.style.animation = 'fadeUp 0.4s ease forwards';
        $('result-url').textContent = finalURL;

        const ig = $('info-grid');
        ig.innerHTML = `
      <div class="info-item"><div class="label">DROP POINT</div><div class="value">${formatCoords(state.dropLat, state.dropLng)}</div></div>
      <div class="info-item"><div class="label">RADIUS</div><div class="value">100 METERS</div></div>
      <div class="info-item"><div class="label">ENCRYPTION</div><div class="value">AES-256-GCM</div></div>
      <div class="info-item"><div class="label">EXPIRES IN</div><div class="value" id="exp-countdown">${timeUntil(payload.e)}</div></div>
    `;

        // Live countdown
        const expTs = payload.e;
        const countdownInterval = setInterval(() => {
          const el = $('exp-countdown');
          if (!el) { clearInterval(countdownInterval); return; }
          el.textContent = timeUntil(expTs);
        }, 60000);

        $('copy-btn').addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(finalURL);
          } catch (e) {
            const ta = document.createElement('textarea');
            ta.value = finalURL;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          const cb = $('copy-btn');
          cb.textContent = '✓ COPIED — SHARE AND DESTROY';
          cb.classList.add('copy-success');
          setTimeout(() => {
            cb.textContent = '[ COPY LINK ]';
            cb.classList.remove('copy-success');
          }, 3000);
        });

        rp.scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        btn.disabled = false;
        ls.style.display = 'none';
        alert('ENCRYPTION FAILED: ' + e.message);
      }
    }

    // ═══════════════════════════════════════
    // RETRIEVE SCREEN
    // ═══════════════════════════════════════
    function renderRetrieve() {
      const p = state.payload;
      if (!p || !p.v) { renderInvalid(); return; }

      $('mode-label').textContent = 'INCOMING TRANSMISSION';
      $('app').innerHTML = `
    <div class="panel">
      <div class="step-label">INCOMING</div>
      <div class="step-title">TRANSMISSION DETECTED</div>
      <div class="transmission-info">
        <div class="t-row"><span class="t-key">STATUS</span><span class="t-val">◉ AWAITING VERIFICATION</span></div>
        <div class="t-row"><span class="t-key">CREATED</span><span class="t-val">${timeAgo(p.t)}</span></div>
        <div class="t-row"><span class="t-key">EXPIRES IN</span><span class="t-val" id="exp-live">${timeUntil(p.e)}</span></div>
        <div class="t-row"><span class="t-key">REQUIRED RADIUS</span><span class="t-val">${p.r} METERS</span></div>
        <div class="t-row"><span class="t-key">ENCRYPTION</span><span class="t-val">AES-256-GCM</span></div>
      </div>
    </div>

    <div class="panel" id="verify-panel">
      <div class="step-label">VERIFY</div>
      <div class="step-title">LOCATION VERIFICATION</div>
      <div class="verify-area">
        <button class="btn" id="verify-btn">[ VERIFY COORDINATES ]</button>
      </div>
      <div id="gps-status"></div>
      <div id="msg-panel"></div>
      <div id="denied-panel"></div>
    </div>
  `;

      // Check expiry
      if (p.e <= Date.now()) { renderExpired(); return; }

      // Live expiry countdown
      const ei = setInterval(() => {
        const el = $('exp-live');
        if (!el) { clearInterval(ei); return; }
        el.textContent = timeUntil(p.e);
      }, 60000);

      $('verify-btn').addEventListener('click', doVerify);
    }

    async function doVerify() {
      const p = state.payload;
      if (!p) return;

      $('verify-btn').disabled = true;
      const gs = $('gps-status');
      gs.innerHTML = `<div class="gps-status">ACQUIRING GPS SIGNAL<span class="gps-dots"></span></div>`;

      let attempts = 0;
      const maxAttempts = 3;

      function tryGetLocation() {
        attempts++;
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            gs.innerHTML = `<div class="gps-status" style="font-size:1rem">TRIANGULATING POSITION...</div>`;
            await sleep(800);

            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            const dist = haversine(userLat, userLng, p.la, p.ln);

            gs.innerHTML = `<div class="gps-status" style="font-size:1rem">COMPARING COORDINATES...</div>`;
            await sleep(600);

            if (dist <= p.r) {
              await handleSuccess(userLat, userLng, dist);
            } else {
              handleDenied(dist);
            }
          },
          (err) => {
            let msg = '';
            switch (err.code) {
              case 1: msg = 'LOCATION ACCESS DENIED\nCANNOT VERIFY IDENTITY'; break;
              case 2: msg = 'SIGNAL LOST\nMOVE TO OPEN AREA AND RETRY'; break;
              case 3:
                if (attempts < maxAttempts) {
                  gs.innerHTML = `<div class="gps-status">SIGNAL TIMEOUT — RETRYING (${attempts}/${maxAttempts})<span class="gps-dots"></span></div>`;
                  setTimeout(tryGetLocation, 1000);
                  return;
                }
                msg = 'SIGNAL TIMEOUT\nMAX RETRIES REACHED';
                break;
            }
            gs.innerHTML = `<div class="gps-status" style="color:var(--red);font-size:1rem">${msg}</div>`;
            $('verify-btn').disabled = false;
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      }

      if (!navigator.geolocation) {
        gs.innerHTML = `<div class="gps-status" style="color:var(--red)">GPS NOT AVAILABLE ON THIS DEVICE</div>`;
        return;
      }
      tryGetLocation();
    }

    async function handleSuccess(userLat, userLng, dist) {
      const p = state.payload;
      const gs = $('gps-status');
      gs.innerHTML = `
    <div style="color:var(--green);font-size:0.8rem;letter-spacing:0.15em;padding:12px 0">
      ◉ LOCATION VERIFIED — ${dist}M FROM DROP POINT<br>
      DECRYPTING TRANSMISSION...
    </div>
  `;
      await sleep(800);

      try {
        const decrypted = await decryptMessage(p, userLat, userLng);
        const mp = $('msg-panel');
        mp.style.display = 'block';
        mp.innerHTML = `
      <hr class="divider">
      <div style="font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.3em;color:var(--green-dim);margin-bottom:8px">DECRYPTED MESSAGE</div>
      <div class="msg-box" id="msg-reveal"></div>
      <div class="burn-countdown" id="burn-cd" style="display:none"></div>
    `;

        await typewriter($('msg-reveal'), decrypted, 30);

        const burnEl = $('burn-cd');
        burnEl.style.display = 'block';

        let count = 5;
        burnEl.textContent = `BURNING IN ${count}...`;
        const burnInterval = setInterval(() => {
          count--;
          if (count > 0) {
            burnEl.textContent = `BURNING IN ${count}...`;
          } else {
            clearInterval(burnInterval);
            burnEl.textContent = 'TRANSMISSION DESTROYED';
            setTimeout(() => {
              $('msg-reveal').style.transition = 'opacity 1s';
              $('msg-reveal').style.opacity = '0';
              history.replaceState(null, '', '#burned');
              setTimeout(() => {
                $('msg-reveal').textContent = '';
                mp.innerHTML = `<div style="text-align:center;padding:20px;color:var(--red);font-family:'VT323',monospace;font-size:1.5rem;letter-spacing:0.2em">⊗ TRANSMISSION BURNED — NOTHING REMAINS</div>`;
              }, 1000);
            }, 500);
          }
        }, 1000);

      } catch (e) {
        gs.innerHTML = `<div style="color:var(--red);padding:12px 0;font-size:0.75rem;letter-spacing:0.1em">⊗ DECRYPTION FAILED — PAYLOAD MAY BE CORRUPTED</div>`;
      }
    }

    function handleDenied(dist) {
      const dp = $('denied-panel');
      const gs = $('gps-status');
      gs.innerHTML = '';
      dp.innerHTML = `
    <hr class="divider">
    <div class="denied-screen">
      <div class="denied-big">⊗ ACCESS DENIED</div>
      <div class="denied-sub">COORDINATES DO NOT MATCH DROP POINT</div>
      <div class="denied-dist">YOU ARE <strong style="color:var(--red)">${dist} METERS</strong> OFF TARGET</div>
      <div class="denied-dist" style="color:var(--green-dim);font-size:0.7rem">MOVE CLOSER TO THE DROP POINT AND RETRY</div>
      <br>
      <button class="btn btn-red" id="retry-btn">[ RETRY VERIFICATION ]</button>
    </div>
  `;
      $('retry-btn').addEventListener('click', () => {
        dp.innerHTML = '';
        $('verify-btn').disabled = false;
      });
    }

    // ═══════════════════════════════════════
    // SPECIAL SCREENS
    // ═══════════════════════════════════════
    function renderBurned() {
      $('mode-label').textContent = 'TRANSMISSION DESTROYED';
      $('app').innerHTML = `
    <div class="panel">
      <div class="special-screen">
        <div class="special-icon">⊗</div>
        <div class="special-title" style="color:var(--red)">TRANSMISSION ALREADY BURNED</div>
        <div class="special-sub">
          THIS MESSAGE WAS READ AND DESTROYED<br>
          NOTHING REMAINS IN THIS DEAD DROP<br><br>
          <span style="color:var(--green-dim)">THE INFORMATION EXISTS ONLY IN MEMORY NOW</span>
        </div>
        <br><br>
        <button class="btn" onclick="window.location.href=window.location.pathname">[ CREATE NEW DROP ]</button>
      </div>
    </div>
  `;
    }

    function renderExpired() {
      $('mode-label').textContent = 'TRANSMISSION EXPIRED';
      const p = state.payload;
      const ago = p ? timeAgo(p.e) : 'UNKNOWN';
      $('app').innerHTML = `
    <div class="panel">
      <div class="special-screen">
        <div class="special-icon" style="color:var(--amber)">⊘</div>
        <div class="special-title" style="color:var(--amber)">TRANSMISSION EXPIRED</div>
        <div class="special-sub">
          THIS DROP SELF-DESTRUCTED ${ago}<br>
          THE MESSAGE NO LONGER EXISTS<br><br>
          <span style="color:var(--green-dim)">ALL DEAD DROPS EXPIRE AFTER 24 HOURS</span>
        </div>
        <br><br>
        <button class="btn btn-amber" onclick="window.location.href=window.location.pathname">[ CREATE NEW DROP ]</button>
      </div>
    </div>
  `;
    }

    function renderInvalid() {
      $('mode-label').textContent = 'INVALID TRANSMISSION';
      $('app').innerHTML = `
    <div class="panel">
      <div class="special-screen">
        <div class="special-icon" style="color:var(--red)">⊗</div>
        <div class="special-title" style="color:var(--red)">INVALID TRANSMISSION</div>
        <div class="special-sub">
          PAYLOAD CORRUPTED OR TAMPERED<br>
          THIS LINK CANNOT BE DECRYPTED<br><br>
          <span style="color:var(--green-dim)">VERIFY THE LINK IS COMPLETE AND UNMODIFIED</span>
        </div>
        <br><br>
        <button class="btn btn-red" onclick="window.location.href=window.location.pathname">[ CREATE NEW DROP ]</button>
      </div>
    </div>
  `;
    }

    // ═══════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function typewriter(el, text, delay) {
      el.textContent = '';
      for (let i = 0; i < text.length; i++) {
        el.textContent += text[i];
        await sleep(delay);
      }
    }

    // ═══════════════════════════════════════
    // CHECK CRYPTO SUPPORT
    // ═══════════════════════════════════════
    if (!window.crypto || !window.crypto.subtle) {
      document.getElementById('app').innerHTML = `
    <div class="panel" style="text-align:center;padding:60px 20px">
      <div style="font-family:'VT323',monospace;font-size:3rem;color:var(--red)">⊗</div>
      <div style="font-family:'Orbitron',monospace;font-size:0.8rem;letter-spacing:0.3em;color:var(--red);margin:12px 0">BROWSER NOT SUPPORTED</div>
      <div style="font-size:0.75rem;color:var(--text);letter-spacing:0.1em">USE CHROME, FIREFOX OR SAFARI WITH HTTPS</div>
    </div>
  `;
    } else {
      route();
    }
  </script>
</body>

</html>

      padding: 12px 20px; border: 1px solid var(--green-dim);
      background: transparent; color: var(--green); border-radius: 3px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--green); color: #000; border-color: var(--green); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-full { width: 100%; }
    .btn-red { border-color: rgba(255,34,34,0.5); color: var(--red); }
    .btn-red:hover:not(:disabled) { background: var(--red); color: #000; border-color: var(--red); }
    .btn-amber { border-color: rgba(255,170,0,0.5); color: var(--amber); }
    .btn-amber:hover:not(:disabled) { background: var(--amber); color: #000; border-color: var(--amber); }

    /* STATUS */
    .status { border-radius: 3px; padding: 10px 14px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.6; white-space: pre-line; }
    .s-green { background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2); color: var(--green); }
    .s-red   { background: rgba(255,34,34,0.05);  border: 1px solid rgba(255,34,34,0.25); color: var(--red); }
    .s-amber { background: rgba(255,170,0,0.05);  border: 1px solid rgba(255,170,0,0.25); color: var(--amber); }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; animation: pulse 1s infinite; }
    .dot-g { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-r { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot-a { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

    /* LOADING STEPS */
    .loading-steps { font-size: 13px; color: var(--green-dim); line-height: 2.1; min-height: 60px; }
    .lstep { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .lstep::before { content: '▸ '; color: var(--green); }
    .lstep.done { color: var(--green); }
    .lstep.done::before { content: '✓ '; }

    /* URL BOX */
    .url-box { background: rgba(0,255,65,0.03); border: 1px solid var(--border); border-radius: 3px; padding: 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green-dim); word-break: break-all; line-height: 1.8; max-height: 100px; overflow-y: auto; margin-bottom: 12px; }

    /* INFO GRID */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .info-cell { background: rgba(0,255,65,0.03); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; }
    .info-lbl { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--green-dim); margin-bottom: 4px; }
    .info-val { font-size: 13px; color: var(--green); }

    /* WARN BOX */
    .warn-box { background: rgba(255,170,0,0.04); border: 1px solid rgba(255,170,0,0.2); border-radius: 3px; padding: 12px 14px; font-size: 12px; color: var(--amber); letter-spacing: 0.05em; line-height: 1.9; margin-top: 12px; }

    /* COUNTDOWN */
    .countdown-vt { font-family: 'VT323', monospace; font-size: 30px; color: var(--green); text-shadow: 0 0 10px var(--green); letter-spacing: 0.1em; }

    /* MESSAGE REVEAL */
    .msg-reveal { background: rgba(0,255,65,0.04); border: 1px solid rgba(0,255,65,0.25); border-radius: 3px; padding: 20px; font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--green); line-height: 1.8; min-height: 80px; text-shadow: 0 0 5px rgba(0,255,65,0.25); white-space: pre-wrap; word-break: break-word; }
    .cursor { display: inline-block; width: 9px; height: 16px; background: var(--green); vertical-align: text-bottom; margin-left: 2px; animation: blink 0.7s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ACCESS DENIED */
    .denied-wrap { text-align: center; padding: 10px 0 20px; }
    .denied-glyph { font-family: 'VT323', monospace; font-size: 80px; color: var(--red); display: block; line-height: 1; text-shadow: 0 0 20px var(--red); animation: flicker 3s infinite; margin-bottom: 8px; }
    .denied-title { font-family: 'Orbitron', monospace; font-size: clamp(18px,5vw,28px); font-weight: 900; color: var(--red); letter-spacing: 0.15em; text-shadow: 0 0 15px var(--red); animation: flicker 2.5s infinite 0.3s; margin-bottom: 8px; }
    .denied-sub { font-size: 13px; color: rgba(255,34,34,0.65); letter-spacing: 0.08em; margin: 6px 0; }
    .dist-badge { display: inline-block; background: rgba(255,34,34,0.08); border: 1px solid rgba(255,34,34,0.3); border-radius: 3px; padding: 8px 20px; font-family: 'VT323', monospace; font-size: 28px; color: var(--red); text-shadow: 0 0 8px var(--red); margin: 12px 0; letter-spacing: 0.1em; }

    /* BURN */
    .burn-line { font-family: 'VT323', monospace; font-size: 36px; color: var(--red); text-align: center; text-shadow: 0 0 15px var(--red); animation: flicker 1.5s infinite; letter-spacing: 0.12em; margin-top: 16px; }

    /* TERMINAL MSG (centered states) */
    .tmsg { text-align: center; padding: 20px 10px 30px; }
    .tmsg-icon { font-family: 'VT323', monospace; font-size: 74px; display: block; line-height: 1; margin-bottom: 12px; }
    .tmsg-title { font-family: 'Orbitron', monospace; font-size: clamp(13px,4.5vw,22px); font-weight: 700; letter-spacing: 0.15em; margin-bottom: 12px; }
    .tmsg-body { font-size: 13px; letter-spacing: 0.05em; color: rgba(160,255,176,0.5); line-height: 1.9; }

    /* TECH FOOTER */
    .tech-list { font-size: 11px; color: rgba(160,255,176,0.28); letter-spacing: 0.08em; line-height: 2.2; }

    /* UTILS */
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .hidden { display: none !important; }
    .flex-row { display: flex; gap: 8px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.15} 94%{opacity:1} 96%{opacity:0.5} 97%{opacity:1} }
    @keyframes fadeOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(0.97)} }
    .fade-out { animation: fadeOut 1.5s ease forwards; }

    .dots::after { content: '.'; animation: dot3 1.2s step-end infinite; }
    @keyframes dot3 { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }
  </style>
</head>
<body>
<div class="scan-bar"></div>
<div id="app"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

/* ── CRYPTO CHECK ── */
if (!window.crypto?.subtle) {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;font-family:Orbitron,monospace;">
      <div style="font-size:60px;color:#ff2222;margin-bottom:12px;">⊗</div>
      <div style="font-size:18px;color:#ff2222;letter-spacing:0.2em;">BROWSER NOT SUPPORTED</div>
      <div style="font-size:13px;color:#a0ffb0;font-family:'Share Tech Mono',monospace;margin-top:12px;">
        Web Crypto API required.<br>Use Chrome, Firefox, or Safari over HTTPS.
      </div>
    </div>`;
  throw new Error('No Web Crypto');
}

/* ── CONSTANTS ── */
const BASE_URL = window.location.hostname.includes('github.io')
  ? 'https://primesandy.github.io/deaddrop-/'
  : (window.location.origin + window.location.pathname);

let _map = null;

/* ── UTILS ── */
function toB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function fromB64(str) {
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while (str.length % 4) str += '=';
  return Uint8Array.from(atob(str), c => c.charCodeAt(0)).buffer;
}
function formatCoords(lat, lng) {
  const ns = lat >= 0 ? 'N' : 'S', ew = lng >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(4)}°${ns}  ${Math.abs(lng).toFixed(4)}°${ew}`;
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 10) return 'JUST NOW';
  if (s < 60) return `${s}S AGO`;
  const m = Math.floor(s/60);
  if (m < 60) return `${m}M ${s%60}S AGO`;
  const h = Math.floor(m/60);
  return `${h}H ${m%60}M AGO`;
}
function formatRemaining(expiry) {
  const d = expiry - Date.now();
  if (d <= 0) return 'EXPIRED';
  const h = Math.floor(d/3600000);
  const m = Math.floor((d%3600000)/60000);
  const s = Math.floor((d%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const p1 = lat1*Math.PI/180, p2 = lat2*Math.PI/180;
  const dp = (lat2-lat1)*Math.PI/180, dl = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const delay = ms => new Promise(r => setTimeout(r, ms));

/* ── CRYPTO ── */
async function deriveKey(lat, lng) {
  const raw = `${parseFloat(lat).toFixed(4)}:${parseFloat(lng).toFixed(4)}`;
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(raw), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt: new TextEncoder().encode('deaddrop-salt-v1'), iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']
  );
}
async function encryptMsg(msg, lat, lng) {
  const key = await deriveKey(lat, lng);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(msg));
  return {ct, iv};
}
async function decryptMsg(payload) {
  const key = await deriveKey(payload.la, payload.ln);
  const iv = new Uint8Array(fromB64(payload.i));
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, fromB64(payload.c));
  return new TextDecoder().decode(pt);
}

/* ── PAYLOAD ── */
function encodePayload(p) {
  return btoa(JSON.stringify(p)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function decodePayload(hash) {
  try {
    let s = (hash.startsWith('#') ? hash.slice(1) : hash).replace(/-/g,'+').replace(/_/g,'/');
    while (s.length%4) s+='=';
    return JSON.parse(atob(s));
  } catch { return null; }
}

/* ── TYPEWRITER ── */
function typewriter(el, text, ms, cb) {
  el.innerHTML = '';
  const cur = document.createElement('span');
  cur.className = 'cursor';
  el.appendChild(cur);
  let i = 0;
  const tick = () => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i++]), cur);
      setTimeout(tick, ms);
    } else { cur.remove(); if (cb) cb(); }
  };
  tick();
}

/* ── GPS ERROR TEXT ── */
function gpsErrTxt(err) {
  switch(err.code) {
    case 1: return 'LOCATION ACCESS DENIED\nCANNOT VERIFY IDENTITY';
    case 2: return 'SIGNAL LOST\nMOVE TO OPEN AREA AND RETRY';
    case 3: return 'SIGNAL TIMEOUT\nRETRYING...';
    default: return `GPS ERROR: ${err.message}`;
  }
}

/* ── HEADER ── */
function headerHTML(top, sub) {
  return `<header class="site-header">
    <div class="logo-line">[ ${top} ]</div>
    <div class="site-title">DEAD DROP</div>
    <div class="site-subtitle">${sub}</div>
    <div class="header-rule"></div>
  </header>`;
}

/* ── ROUTER ── */
function route() {
  if (_map) { try { _map.remove(); } catch{} _map = null; }
  const h = window.location.hash;
  if (h === '#burned') renderBurned();
  else if (h && h.length > 1) renderRetrieve(h);
  else renderDrop();
}

/* ══════════════════════════════════════
   DROP MODE
══════════════════════════════════════ */
function renderDrop() {
  const app = document.getElementById('app');
  app.innerHTML = headerHTML('CLASSIFIED SYSTEM', '// ENCRYPT TRANSMISSION') + `

  <div class="panel" style="animation-delay:0.05s">
    <div class="step-label">01 / COMPOSE</div>
    <div class="step-title">ENTER TRANSMISSION</div>
    <textarea id="msg-ta" maxlength="500" placeholder="ENTER TRANSMISSION..." spellcheck="false" autocomplete="off"></textarea>
    <div class="char-count" id="cc">0 / 500 CHARS</div>
  </div>

  <div class="panel" style="animation-delay:0.1s">
    <div class="step-label">02 / SET DROP POINT</div>
    <div class="step-title">PIN DROP LOCATION ON MAP</div>
    <div class="search-row">
      <input type="text" id="srch-in" placeholder="SEARCH ADDRESS OR PLACE..." />
      <button class="btn" id="btn-srch">[ LOCATE ]</button>
    </div>
    <div id="srch-st" style="font-size:12px;color:var(--green-dim);min-height:18px;margin-bottom:8px;letter-spacing:0.06em;"></div>
    <div id="map-container"></div>
    <p class="map-hint" id="map-hint">CLICK MAP TO SET DROP POINT</p>
    <div id="coord-wrap" class="hidden">
      <div class="coord-box">
        <div class="coord-label">◉ DROP POINT LOCKED</div>
        <div class="coord-val" id="coord-val"></div>
        <div class="coord-city" id="coord-city"></div>
      </div>
    </div>
  </div>

  <div class="panel" style="animation-delay:0.15s">
    <div class="step-label">03 / ENCRYPT</div>
    <div class="step-title">GENERATE DEAD DROP</div>
    <button class="btn btn-full" id="btn-enc" disabled>[ ENCRYPT &amp; GENERATE DEAD DROP ]</button>
    <div class="loading-steps mt-12 hidden" id="lsteps"></div>
  </div>

  <div class="panel hidden" id="result-panel" style="animation-delay:0.2s">
    <div class="step-label">04 / TRANSMIT</div>
    <div class="step-title">DEAD DROP READY — COPY &amp; SHARE</div>
    <div class="url-box" id="r-url"></div>
    <div class="flex-row" style="margin-bottom:14px;">
      <button class="btn btn-full" id="btn-copy">[ COPY LINK ]</button>
      <button class="btn btn-full btn-amber" id="btn-again">[ DROP ANOTHER ]</button>
    </div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-lbl">DROP POINT</div>
        <div class="info-val" id="r-loc" style="font-size:11px;">—</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">RADIUS</div>
        <div class="info-val">100 METERS</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">ENCRYPTION</div>
        <div class="info-val" style="font-size:11px;">AES-256-GCM</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">EXPIRES IN</div>
        <div class="info-val countdown-vt" id="r-cd">—</div>
      </div>
    </div>
    <div class="warn-box">
      ⚠ THIS TRANSMISSION SELF-DESTRUCTS AFTER ONE READ<br>
      SHARE THIS LINK THROUGH A SECURE CHANNEL<br>
      DO NOT STORE THIS URL ANYWHERE
    </div>
  </div>`;

  /* MAP INIT */
  let dLat = null, dLng = null, dMarker = null, cdTimer = null;

  const greenIcon = L.divIcon({
    className: '',
    html: `<div style="width:20px;height:20px;background:#00ff41;border:2px solid #000;border-radius:50%;box-shadow:0 0 15px #00ff41,0 0 30px #00aa2b;"></div>`,
    iconSize: [20,20], iconAnchor: [10,10]
  });

  _map = L.map('map-container', {center:[20.5937,78.9629], zoom:5, zoomControl:true, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(_map);

  function checkReady() {
    const hasMsg = document.getElementById('msg-ta')?.value.trim().length > 0;
    const b = document.getElementById('btn-enc');
    if (b) b.disabled = !(hasMsg && dLat !== null);
  }

  function placeMarker(lat, lng) {
    dLat = lat; dLng = lng;
    if (dMarker) _map.removeLayer(dMarker);
    dMarker = L.marker([lat,lng], {icon:greenIcon}).addTo(_map);
    document.getElementById('coord-val').textContent = formatCoords(lat, lng);
    document.getElementById('coord-wrap').classList.remove('hidden');
    document.getElementById('map-hint').textContent = 'CLICK MAP TO CHANGE DROP POINT';
    // Reverse geocode city
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
      .then(r=>r.json()).then(d=>{
        const city = d.address?.city||d.address?.town||d.address?.village||d.address?.county||'';
        const cc = d.address?.country_code?.toUpperCase()||'';
        const el = document.getElementById('coord-city');
        if (el && (city||cc)) el.textContent = [city,cc].filter(Boolean).join(', ');
      }).catch(()=>{});
    checkReady();
  }

  _map.on('click', e => {
    placeMarker(parseFloat(e.latlng.lat.toFixed(4)), parseFloat(e.latlng.lng.toFixed(4)));
  });

  /* TEXTAREA */
  document.getElementById('msg-ta').addEventListener('input', () => {
    const n = document.getElementById('msg-ta').value.length;
    const c = document.getElementById('cc');
    c.textContent = `${n} / 500 CHARS`;
    c.className = 'char-count' + (n>450?(n>=500?' over':' warn'):'');
    checkReady();
  });

  /* SEARCH */
  function doSearch() {
    const q = document.getElementById('srch-in').value.trim();
    if (!q) return;
    const ss = document.getElementById('srch-st');
    ss.textContent = 'LOCATING...'; ss.style.color = 'var(--green-dim)';
    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`)
      .then(r=>r.json()).then(data=>{
        if (data&&data[0]) {
          const lat = parseFloat(parseFloat(data[0].lat).toFixed(4));
          const lng = parseFloat(parseFloat(data[0].lon).toFixed(4));
          _map.setView([lat,lng], 16);
          placeMarker(lat, lng);
          ss.textContent = `◉ LOCATED: ${data[0].display_name.split(',').slice(0,2).join(',').toUpperCase()}`;
          ss.style.color = 'var(--green)';
        } else {
          ss.textContent = '⊗ NOT FOUND — TRY A DIFFERENT QUERY'; ss.style.color = 'var(--red)';
        }
      }).catch(()=>{ ss.textContent = '⊗ SEARCH FAILED'; ss.style.color = 'var(--red)'; });
  }
  document.getElementById('btn-srch').addEventListener('click', doSearch);
  document.getElementById('srch-in').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

  /* ENCRYPT */
  document.getElementById('btn-enc').addEventListener('click', async () => {
    const msg = document.getElementById('msg-ta').value.trim();
    if (!msg || dLat===null) return;
    document.getElementById('btn-enc').disabled = true;
    const ls = document.getElementById('lsteps');
    ls.classList.remove('hidden'); ls.innerHTML = '';

    const steps = [
      'DERIVING KEY FROM COORDINATES...',
      'ENCRYPTING WITH AES-256-GCM...',
      'ENCODING PAYLOAD...',
      'GENERATING LINK...'
    ];
    for (let i=0; i<steps.length-1; i++) {
      const el = Object.assign(document.createElement('div'), {className:'lstep', textContent:steps[i]});
      ls.appendChild(el);
      await delay(420);
    }
    try {
      const {ct, iv} = await encryptMsg(msg, dLat, dLng);
      const now = Date.now(), expiry = now + 86400000;
      const payload = {v:1, c:toB64(ct), i:toB64(iv.buffer), la:dLat, ln:dLng, r:100, e:expiry, t:now};
      const encoded = encodePayload(payload);
      const finalURL = BASE_URL + '#' + encoded;

      ls.querySelectorAll('.lstep').forEach(el=>el.classList.add('done'));
      const last = Object.assign(document.createElement('div'), {className:'lstep done', textContent:steps[3]});
      ls.appendChild(last);
      await delay(300);

      const rp = document.getElementById('result-panel');
      rp.classList.remove('hidden');
      document.getElementById('r-url').textContent = finalURL;

      const cityEl = document.getElementById('coord-city');
      document.getElementById('r-loc').textContent = (cityEl?.textContent.trim()) || formatCoords(dLat,dLng);

      if (cdTimer) clearInterval(cdTimer);
      const updateCd = () => { const e=document.getElementById('r-cd'); if(e) e.textContent=formatRemaining(expiry); };
      updateCd(); cdTimer = setInterval(updateCd, 1000);

      document.getElementById('btn-copy').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(finalURL); }
        catch {
          try {
            const ta = Object.assign(document.createElement('textarea'), {value:finalURL});
            Object.assign(ta.style, {position:'fixed',opacity:'0'});
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
          } catch { document.getElementById('r-url').style.outline='1px solid var(--amber)'; return; }
        }
        const b = document.getElementById('btn-copy');
        b.textContent = '✓ COPIED — SHARE AND DESTROY';
        setTimeout(()=>{ const bb=document.getElementById('btn-copy'); if(bb) bb.textContent='[ COPY LINK ]'; }, 3000);
      });

      rp.scrollIntoView({behavior:'smooth', block:'nearest'});
    } catch(err) {
      const el = Object.assign(document.createElement('div'), {className:'lstep', textContent:`ENCRYPTION FAILED: ${err.message}`});
      el.style.color = 'var(--red)';
      ls.appendChild(el);
      document.getElementById('btn-enc').disabled = false;
    }
  });

  /* DROP ANOTHER */
  document.getElementById('app').addEventListener('click', e => {
    if (e.target.id === 'btn-again') {
      if (cdTimer) clearInterval(cdTimer);
      history.replaceState(null,'', window.location.pathname);
      route();
    }
  });
}

   RETRIEVE MODE
══════════════════════════════════════ */
function renderRetrieve(hash) {
  const app = document.getElementById('app');
  const payload = decodePayload(hash);

  if (!payload || payload.v !== 1) {
    app.innerHTML = headerHTML('INCOMING TRANSMISSION','// DECRYPT MESSAGE') + `
      <div class="panel"><div class="tmsg">
        <span class="tmsg-icon" style="color:var(--red);">⊗</span>
        <div class="tmsg-title" style="color:var(--red);">INVALID TRANSMISSION</div>
        <div class="tmsg-body">PAYLOAD CORRUPTED OR TAMPERED<br>DATA CANNOT BE RECOVERED</div>
        <div class="mt-20"><a href="${window.location.pathname}" class="btn" style="text-decoration:none;">[ CREATE NEW DROP ]</a></div>
      </div></div>`;
    return;
  }

  if (payload.e <= Date.now()) {
    app.innerHTML = headerHTML('INCOMING TRANSMISSION','// DECRYPT MESSAGE') + `
      <div class="panel"><div class="tmsg">
        <span class="tmsg-icon" style="color:var(--amber);">⊗</span>
        <div class="tmsg-title" style="color:var(--amber);">TRANSMISSION EXPIRED</div>
        <div class="tmsg-body">THIS DROP SELF-DESTRUCTED ${timeAgo(payload.e)}<br>NO DATA CAN BE RECOVERED</div>
        <div class="mt-20"><a href="${window.location.pathname}" class="btn btn-amber" style="text-decoration:none;">[ CREATE NEW DROP ]</a></div>
      </div></div>`;
    return;
  }

  app.innerHTML = headerHTML('INCOMING TRANSMISSION','// DECRYPT MESSAGE') + `

  <div class="panel" style="animation-delay:0.05s">
    <div class="step-label">01 / TRANSMISSION DETECTED</div>
    <div class="step-title">SIGNAL INTERCEPTED</div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-lbl">CREATED</div>
        <div class="info-val" id="r-created">${timeAgo(payload.t)}</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">EXPIRES IN</div>
        <div class="info-val countdown-vt" id="r-expires">${formatRemaining(payload.e)}</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">REQUIRED RADIUS</div>
        <div class="info-val">${payload.r}M</div>
      </div>
      <div class="info-cell">
        <div class="info-lbl">STATUS</div>
        <div class="info-val" style="font-size:11px;color:var(--amber);">AWAITING VERIFICATION</div>
      </div>
    </div>
  </div>

  <div class="panel" style="animation-delay:0.1s" id="verify-panel">
    <div class="step-label">02 / VERIFY LOCATION</div>
    <div class="step-title">LOCATION AUTHENTICATION REQUIRED</div>
    <button class="btn btn-full" id="btn-verify">[ VERIFY COORDINATES ]</button>
    <div id="v-status" class="mt-12" style="min-height:46px;"></div>
  </div>

  <div class="panel hidden" id="msg-panel" style="animation-delay:0.15s">
    <div class="step-label">03 / DECRYPTED</div>
    <div class="step-title" id="msg-ptitle">TRANSMISSION CONTENT</div>
    <div class="msg-reveal" id="msg-reveal"></div>
    <div class="burn-line hidden" id="burn-line"></div>
    <div class="mt-16 hidden" id="retry-wrap">
      <button class="btn btn-full btn-red" id="btn-retry">[ RETRY VERIFICATION ]</button>
    </div>
  </div>`;

  /* Live info update */
  let infoTimer = setInterval(() => {
    const rc = document.getElementById('r-created');
    const re = document.getElementById('r-expires');
    if (rc) rc.textContent = timeAgo(payload.t);
    if (re) re.textContent = formatRemaining(payload.e);
  }, 1000);

  let retries = 0;

  function setVStatus(cls, dotCls, html) {
    const vs = document.getElementById('v-status');
    if (!vs) return;
    vs.innerHTML = `<div class="status ${cls}"><div class="dot ${dotCls}"></div><div>${html}</div></div>`;
  }

  function startVerify() {
    const vb = document.getElementById('btn-verify');
    if (vb) vb.disabled = true;
    setVStatus('s-green','dot-g', 'ACQUIRING GPS SIGNAL<span class="dots"></span>');

    navigator.geolocation.getCurrentPosition(
      async pos => {
        const uLat = pos.coords.latitude, uLng = pos.coords.longitude;
        setVStatus('s-green','dot-g','TRIANGULATING POSITION<span class="dots"></span>');
        await delay(600);
        setVStatus('s-green','dot-g','COMPARING COORDINATES<span class="dots"></span>');
        await delay(500);

        const dist = haversine(uLat, uLng, payload.la, payload.ln);

        if (dist <= payload.r) {
          /* SUCCESS */
          clearInterval(infoTimer);
          setVStatus('s-green','dot-g',
            `◉ LOCATION VERIFIED<br>◉ DISTANCE: ${Math.round(dist)}M FROM DROP POINT — WITHIN RANGE<br>DECRYPTING TRANSMISSION...`);

          document.getElementById('msg-panel').classList.remove('hidden');
          try {
            const plaintext = await decryptMsg(payload);
            const mr = document.getElementById('msg-reveal');
            typewriter(mr, plaintext, 30, () => {
              const pt = document.getElementById('msg-ptitle');
              if(pt) pt.textContent = '— TRANSMISSION COMPLETE —';
              const bl = document.getElementById('burn-line');
              if(bl) bl.classList.remove('hidden');
              let n = 5;
              bl.textContent = `BURNING IN ${n}...`;
              const burnT = setInterval(() => {
                n--;
                if (n > 0) { bl.textContent = `BURNING IN ${n}...`; }
                else {
                  clearInterval(burnT);
                  bl.textContent = 'BURNED.';
                  document.getElementById('msg-panel').classList.add('fade-out');
                  setTimeout(() => {
                    history.replaceState(null,'','#burned');
                    renderBurned();
                  }, 1500);
                }
              }, 1000);
            });
            document.getElementById('msg-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
          } catch(err) {
            setVStatus('s-red','dot-r', `DECRYPTION FAILED: ${err.message}`);
            if (vb) vb.disabled = false;
          }

        } else {
          /* ACCESS DENIED */
          clearInterval(infoTimer);
          const off = Math.round(dist - payload.r);
          setVStatus('s-red','dot-r','');

          const mp = document.getElementById('msg-panel');
          mp.classList.remove('hidden');
          const mr = document.getElementById('msg-reveal');
          mr.style.cssText = 'background:rgba(255,34,34,0.03);border-color:rgba(255,34,34,0.3);';
          mr.innerHTML = `
            <div class="denied-wrap">
              <span class="denied-glyph">⊗</span>
              <div class="denied-title">ACCESS DENIED</div>
              <div class="denied-sub">COORDINATES DO NOT MATCH DROP POINT</div>
              <div class="dist-badge">YOU ARE ${off}M OFF TARGET</div>
              <div class="denied-sub" style="font-size:11px;margin-top:4px;">MOVE CLOSER AND RETRY</div>
            </div>`;

          const rw = document.getElementById('retry-wrap');
          if (rw) rw.classList.remove('hidden');
          const rb = document.getElementById('btn-retry');
          if (rb) rb.addEventListener('click', () => {
            retries = 0;
            mr.innerHTML = '';
            mr.removeAttribute('style');
            rw.classList.add('hidden');
            setVStatus('s-green','dot-g','');
            infoTimer = setInterval(()=>{
              const rc=document.getElementById('r-created');
              const re=document.getElementById('r-expires');
              if(rc)rc.textContent=timeAgo(payload.t);
              if(re)re.textContent=formatRemaining(payload.e);
            },1000);
            startVerify();
          });

          mp.scrollIntoView({behavior:'smooth',block:'nearest'});
        }
      },
      err => {
        retries++;
        if (err.code === 3 && retries < 3) {
          setVStatus('s-amber','dot-a', `SIGNAL TIMEOUT — RETRYING (${retries}/3)<span class="dots"></span>`);
          setTimeout(startVerify, 1500);
        } else {
          setVStatus('s-red','dot-r', gpsErrTxt(err));
          const vb = document.getElementById('btn-verify');
          if (vb) { vb.disabled = false; vb.textContent = '[ RETRY VERIFICATION ]'; }
        }
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  }

  document.getElementById('btn-verify').addEventListener('click', () => {
    retries = 0;
    startVerify();
  });
}
